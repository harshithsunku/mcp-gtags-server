name: Publish to MCP Registry

# Publishes server.json to the official MCP Registry
# (registry.modelcontextprotocol.io) so Cursor's directory, Claude clients,
# and aggregators discover the server. Ownership is proven two ways: GitHub
# OIDC for the io.github.* namespace, and the `mcp-name:` marker in the
# README (the PyPI long description), which the registry validates against
# the live PyPI page — hence the wait step.
#
# Called automatically from publish.yml on every v* tag; the
# workflow_dispatch trigger exists for recovery — re-publishing a version
# whose tag-time run failed (the tag's checkout is immutable, so fixes to
# server.json can only reach the registry from a manual run off main).

on:
  workflow_call:
    inputs:
      version:
        description: "Package version (with or without a leading v)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (with or without a leading v); must be live on PyPI"
        required: true
        type: string

jobs:
  publish-registry:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # GitHub OIDC login to the MCP registry
    steps:
      - uses: actions/checkout@v4

      - name: Sync server.json version
        run: |
          VERSION="${RAW_VERSION#v}"
          jq --arg v "$VERSION" '.version=$v | .packages[0].version=$v' \
            server.json > server.json.tmp && mv server.json.tmp server.json
          cat server.json
        env:
          RAW_VERSION: ${{ inputs.version }}

      - name: Wait for the release to be live on PyPI
        run: |
          VERSION="${RAW_VERSION#v}"
          for i in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/mcp-gtags-server/$VERSION/json" >/dev/null 2>&1; then
              echo "PyPI has $VERSION"; exit 0
            fi
            echo "waiting for PyPI ($i/30) ..."; sleep 10
          done
          echo "PyPI never served $VERSION" >&2; exit 1
        env:
          RAW_VERSION: ${{ inputs.version }}

      - name: Install mcp-publisher
        run: |
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Publish to the MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

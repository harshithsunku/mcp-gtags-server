name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install GNU Global (for end-to-end tests)
        run: sudo apt-get update && sudo apt-get install -y global universal-ctags exuberant-ctags python3-pygments

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --extra dev pytest -v

      - name: Shellcheck installer
        run: bash -n scripts/install.sh

name: Publish to PyPI

# Release flow (the installer's update channel):
#   1. Bump `version` in pyproject.toml on main.
#   2. Tag it:  git tag v0.6.0 && git push origin v0.6.0
#   3. This workflow builds and publishes to PyPI and creates the GitHub
#      release. Every user re-running install.sh (or `uv tool install
#      --upgrade mcp-gtags-server`) then picks the update up automatically.
#
# Requires PyPI *trusted publishing* configured once for this repository:
# https://docs.pypi.org/trusted-publishers/ (project: mcp-gtags-server,
# workflow: publish.yml, environment: pypi).

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests first
        run: |
          sudo apt-get update && sudo apt-get install -y global
          uv run --extra dev pytest -q

      - name: Build sdist and wheel
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing
      contents: write   # GitHub release
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "mcp-gtags-server $GITHUB_REF_NAME" \
            --generate-notes dist/*

  # Publish the release to the official MCP Registry
  # (registry.modelcontextprotocol.io) so Cursor's directory, Claude clients,
  # and aggregators discover it. Ownership is proven two ways: GitHub OIDC for
  # the io.github.* namespace, and the `mcp-name:` marker in the README (the
  # PyPI long description), which the registry validates against the live
  # PyPI page — hence the wait step.
  publish-registry:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # GitHub OIDC login to the MCP registry
    steps:
      - uses: actions/checkout@v4

      - name: Sync server.json version with the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version=$v | .packages[0].version=$v' \
            server.json > server.json.tmp && mv server.json.tmp server.json
          cat server.json

      - name: Wait for the release to be live on PyPI
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 30); do
            if curl -fsSL "https://pypi.org/pypi/mcp-gtags-server/$VERSION/json" >/dev/null 2>&1; then
              echo "PyPI has $VERSION"; exit 0
            fi
            echo "waiting for PyPI ($i/30) ..."; sleep 10
          done
          echo "PyPI never served $VERSION" >&2; exit 1

      - name: Install mcp-publisher
        run: |
          curl -fsSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher

      - name: Publish to the MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

  # Build the Claude Desktop extension bundle (.mcpb) and attach it to the
  # GitHub release. Users drag it into Claude Desktop and pick a project
  # folder; the gtags toolchain installs itself on first use (Phase-1 lazy
  # bootstrap), so the bundle stays small.
  build-mcpb:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # upload the bundle to the release
    steps:
      - uses: actions/checkout@v4

      - name: Build the bundle
        run: bash scripts/build-mcpb.sh

      - name: Upload to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --clobber mcp-gtags-server.mcpb
